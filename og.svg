<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap');
    </style>
  </defs>
  
  <!-- Bakgrund -->
  <rect width="1200" height="630" fill="#08080c"/>
  
  <!-- Subtil grid-linje -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a1a2e" stroke-width="1"/>
  
  <!-- Blå accent-linje vänster -->
  <rect x="80" y="180" width="3" height="120" fill="#2563eb"/>
  
  <!-- Logotyp -->
  <text x="104" y="218" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="0.15em" fill="#2563eb" text-anchor="start">KAPACITI</text>
  
  <!-- Huvudrubrik -->
  <text x="104" y="278" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="#ffffff" text-anchor="start">Ditt bolag.</text>
  <text x="104" y="350" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="#ffffff" text-anchor="start">100 gånger</text>
  <text x="104" y="422" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="#2563eb" text-anchor="start">starkare.</text>
  
  <!-- Sub-text -->
  <text x="104" y="480" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#6b7280" text-anchor="start">AI-infrastruktur som driver hela ditt operativ.</text>
  
  <!-- URL -->
  <text x="104" y="560" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="0.05em" fill="#374151" text-anchor="start">kapaciti.se</text>
  
  <!-- Dekorativ element höger -->
  <rect x="820" y="160" width="1" height="310" fill="#1f2937"/>
  <text x="870" y="230" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="0.12em" fill="#374151" text-anchor="start">CRM  CMS  SEO  SEM</text>
  <text x="870" y="270" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="0.12em" fill="#374151" text-anchor="start">KUNDTJÄNST  ONBOARDING</text>
  <text x="870" y="310" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="0.12em" fill="#374151" text-anchor="start">RAPPORTERING  LEADS</text>
  <text x="870" y="390" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#111827" text-anchor="start">200+</text>
  <text x="870" y="420" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="start">processer automatiserade</text>
